# Quick Start Section
quickstart:
  title:
    en: "🚀 Quick Start"
    vi: "🚀 Bắt đầu nhanh"
  code:
    en: |-
      # Clone the repository
      git clone https://github.com/realmg51-cpu/TinyAI.git
      
      # Navigate to directory
      cd TinyAI
      
      # Build and run with .NET
      dotnet run
      
      # Or run the downloaded executable
      # Windows: .\TinyAI-win-x64-v1.2.0.exe
      # Linux/macOS: chmod +x TinyAI-linux-x64-v1.2.0 && ./TinyAI-linux-x64-v1.2.0
      
      # Or use Docker
      docker build -t tinyai .
      docker run --rm tinyai
    vi: |-
      # Clone repository
      git clone https://github.com/realmg51-cpu/TinyAI.git
      
      # Vào thư mục
      cd TinyAI
      
      # Build và chạy với .NET
      dotnet run
      
      # Hoặc chạy file đã tải
      # Windows: .\TinyAI-win-x64-v1.2.0.exe
      # Linux/macOS: chmod +x TinyAI-linux-x64-v1.2.0 && ./TinyAI-linux-x64-v1.2.0
      
      # Hoặc dùng Docker
      docker build -t tinyai .
      docker run --rm tinyai

