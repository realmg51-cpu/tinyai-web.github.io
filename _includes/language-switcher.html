<div class="language-switcher">
    <button class="lang-btn {% if page.lang == 'en' or page.lang == nil %}active{% endif %}" 
            onclick="switchLanguage('en')" 
            data-lang="en"
            title="English">
        <span class="lang-code">EN</span>
        <span class="lang-name">English</span>
    </button>
    <button class="lang-btn {% if page.lang == 'vi' %}active{% endif %}" 
            onclick="switchLanguage('vi')" 
            data-lang="vi"
            title="Tiếng Việt">
        <span class="lang-code">VI</span>
        <span class="lang-name">Tiếng Việt</span>
    </button>
</div>

<style>
.language-switcher {
    display: flex;
    gap: 0.5rem;
    background: var(--bg-primary);
    padding: 0.25rem;
    border-radius: 12px;
    border: 1px solid var(--border-color);
}

.lang-btn {
    padding: 0.5rem 1rem;
    border: none;
    background: transparent;
    color: var(--text-muted);
    cursor: pointer;
    border-radius: 8px;
    font-size: 0.9rem;
    font-weight: 500;
    transition: all 0.3s;
    display: flex;
    align-items: center;
    gap: 0.5rem;
}

.lang-btn .lang-name {
    display: none;
}

.lang-btn.active {
    background: var(--primary-gradient);
    color: white;
    box-shadow: 0 4px 10px rgba(102, 126, 234, 0.3);
}

.lang-btn:not(.active):hover {
    background: var(--bg-secondary);
    color: var(--text-primary);
    transform: translateY(-1px);
}

@media (min-width: 768px) {
    .lang-btn .lang-name {
        display: inline;
    }
    .lang-btn .lang-code {
        display: none;
    }
}
</style>

<script>
function switchLanguage(lang) {
    document.querySelectorAll('.lang-btn').forEach(btn => {
        btn.classList.toggle('active', btn.dataset.lang === lang);
    });
    document.documentElement.lang = lang;
    localStorage.setItem('preferred-language', lang);
    location.reload();
}

document.addEventListener('DOMContentLoaded', () => {
    const savedLang = localStorage.getItem('preferred-language');
    const browserLang = navigator.language.startsWith('vi') ? 'vi' : 'en';
    const defaultLang = savedLang || browserLang;
    document.documentElement.lang = defaultLang;
    
    document.querySelectorAll('.lang-btn').forEach(btn => {
        if (btn.dataset.lang === defaultLang) {
            btn.classList.add('active');
        }
    });
});
</script>
