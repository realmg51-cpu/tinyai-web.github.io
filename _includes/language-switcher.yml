<div class="language-switcher">
    <button class="lang-btn {% if page.lang == 'en' or page.lang == nil %}active{% endif %}" 
            onclick="switchLanguage('en')" 
            data-lang="en"
            aria-label="Switch to English">
        <span class="lang-code">EN</span>
        <span class="lang-name">English</span>
    </button>
    <button class="lang-btn {% if page.lang == 'vi' %}active{% endif %}" 
            onclick="switchLanguage('vi')" 
            data-lang="vi"
            aria-label="Chuyển sang tiếng Việt">
        <span class="lang-code">VI</span>
        <span class="lang-name">Tiếng Việt</span>
    </button>
</div>

<style>
.language-switcher {
    display: flex;
    gap: 0.5rem;
    background: var(--bg-primary);
    padding: 0.25rem;
    border-radius: 12px;
    border: 1px solid var(--border-color);
    box-shadow: 0 2px 8px rgba(0, 0, 0, 0.05);
}

.lang-btn {
    padding: 0.5rem 1rem;
    border: none;
    background: transparent;
    color: var(--text-muted);
    cursor: pointer;
    border-radius: 8px;
    font-size: 0.9rem;
    font-weight: 500;
    transition: all 0.3s ease;
    display: flex;
    align-items: center;
    gap: 0.5rem;
    position: relative;
    overflow: hidden;
}

.lang-btn::before {
    content: '';
    position: absolute;
    top: 50%;
    left: 50%;
    width: 0;
    height: 0;
    border-radius: 50%;
    background: rgba(255, 255, 255, 0.2);
    transform: translate(-50%, -50%);
    transition: width 0.3s, height 0.3s;
}

.lang-btn:active::before {
    width: 100px;
    height: 100px;
}

.lang-btn .lang-name {
    display: none;
}

.lang-btn.active {
    background: var(--primary-gradient);
    color: white;
    box-shadow: 0 4px 10px rgba(102, 126, 234, 0.3);
}

.lang-btn.active::after {
    content: '';
    position: absolute;
    bottom: -2px;
    left: 50%;
    transform: translateX(-50%);
    width: 20px;
    height: 2px;
    background: white;
    border-radius: 2px;
    animation: slideIn 0.3s ease;
}

@keyframes slideIn {
    from {
        width: 0;
        opacity: 0;
    }
    to {
        width: 20px;
        opacity: 1;
    }
}

.lang-btn:not(.active):hover {
    background: var(--bg-secondary);
    color: var(--text-primary);
    transform: translateY(-1px);
}

/* Responsive */
@media (min-width: 768px) {
    .lang-btn {
        padding: 0.5rem 1.2rem;
    }
    
    .lang-btn .lang-name {
        display: inline;
    }
    
    .lang-btn .lang-code {
        display: none;
    }
}

@media (max-width: 767px) {
    .lang-btn {
        padding: 0.5rem 0.8rem;
    }
    
    .lang-btn .lang-code {
        display: inline;
        font-weight: 600;
    }
    
    .language-switcher {
        gap: 0.25rem;
    }
}

/* Animation for language switch */
.lang-btn {
    animation: fadeIn 0.3s ease;
}

@keyframes fadeIn {
    from {
        opacity: 0;
        transform: translateY(-5px);
    }
    to {
        opacity: 1;
        transform: translateY(0);
    }
}

/* Tooltip for language buttons */
.lang-btn {
    position: relative;
}

.lang-btn:hover::after {
    content: attr(data-lang);
    position: absolute;
    bottom: -30px;
    left: 50%;
    transform: translateX(-50%);
    background: var(--bg-card);
    color: var(--text-primary);
    padding: 4px 8px;
    border-radius: 4px;
    font-size: 12px;
    white-space: nowrap;
    border: 1px solid var(--border-color);
    box-shadow: var(--card-shadow);
    z-index: 1000;
    pointer-events: none;
}

/* Dark mode adjustments */
[data-theme="dark"] .lang-btn.active {
    box-shadow: 0 4px 10px rgba(129, 140, 248, 0.3);
}

[data-theme="dark"] .lang-btn:not(.active):hover {
    background: var(--bg-card);
}
</style>

<script>
// Language switching functionality
function switchLanguage(lang) {
    // Update active buttons
    document.querySelectorAll('.lang-btn').forEach(btn => {
        if (btn.dataset.lang === lang) {
            btn.classList.add('active');
        } else {
            btn.classList.remove('active');
        }
    });
    
    // Dispatch custom event for other components
    const event = new CustomEvent('languageChanged', { 
        detail: { language: lang } 
    });
    window.dispatchEvent(event);
    
    // Update HTML lang attribute
    document.documentElement.lang = lang;
    
    // Save to localStorage
    localStorage.setItem('preferred-language', lang);
    
    // Animate the switch
    document.querySelector('.language-switcher').style.animation = 'none';
    setTimeout(() => {
        document.querySelector('.language-switcher').style.animation = 'fadeIn 0.3s ease';
    }, 10);
}

// Initialize language from localStorage or browser preference
document.addEventListener('DOMContentLoaded', () => {
    const savedLang = localStorage.getItem('preferred-language');
    const browserLang = navigator.language.startsWith('vi') ? 'vi' : 'en';
    const defaultLang = savedLang || browserLang;
    
    // Set initial active state
    document.querySelectorAll('.lang-btn').forEach(btn => {
        if (btn.dataset.lang === defaultLang) {
            btn.classList.add('active');
        }
    });
    
    // Set HTML lang attribute
    document.documentElement.lang = defaultLang;
});
</script>
