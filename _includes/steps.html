{% assign steps = site.data.steps %}
<div class="steps">
    {% for step in steps %}
    <div class="step">
        <div class="step-number">{{ step.number }}</div>
        <h3 data-i18n="howitworks.step{{ step.number }}.title">{{ step.title.en }}</h3>
        <p data-i18n="howitworks.step{{ step.number }}.desc">{{ step.description.en }}</p>
    </div>
    {% endfor %}
</div>

<style>
.steps {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
    gap: 2rem;
    margin-top: 3rem;
}

.step {
    text-align: center;
    padding: 2rem;
    background: var(--bg-card);
    border: 1px solid var(--border-color);
    border-radius: 24px;
    box-shadow: var(--card-shadow);
    transition: all 0.3s;
}

.step:hover {
    transform: translateY(-8px);
    box-shadow: var(--card-shadow-hover);
    border-color: var(--accent-color);
}

.step-number {
    width: 60px;
    height: 60px;
    background: var(--primary-gradient);
    color: white;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 1.8rem;
    font-weight: 700;
    margin: 0 auto 1.5rem;
}

.step h3 {
    font-size: 1.3rem;
    margin-bottom: 1rem;
}

.step p {
    color: var(--text-muted);
    line-height: 1.6;
}
</style>
