# Site settings
title: "TinyAI"
title_en: "TinyAI - Rule-Based AI Learning Project"
title_vi: "TinyAI - Dự án học AI dựa trên luật"
email: your-email@example.com
description: >-
  A lightweight, rule-based AI written in C# for learning purposes.
  Self-contained executables for Windows, macOS, and Linux.
baseurl: ""
url: "https://tinyai.github.io"
github_username: realmg51-cpu
discord_invite: "https://discord.gg/your-invite-link"

# Build settings
theme: minima
plugins:
  - jekyll-feed
  - jekyll-seo-tag
  - jekyll-sitemap
  - jekyll-paginate

# Markdown settings
markdown: kramdown
highlighter: rouge
kramdown:
  input: GFM
  syntax_highlighter: rouge

# Sass/SCSS
sass:
  sass_dir: _sass
  style: compressed

# Multilingual
languages: ["en", "vi"]
default_lang: "en"

# Navigation
header_pages:
  - about.md

# Collections
collections:
  releases:
    output: true
    permalink: /releases/:path/

# Defaults
defaults:
  - scope:
      path: ""
      type: "posts"
    values:
      layout: "post"
  - scope:
      path: ""
    values:
      layout: "default"
      lang: "en"
  - scope:
      path: "vi"
    values:
      lang: "vi"

# Version info
latest_version: "v1.2.0"
