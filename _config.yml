# Site settings
title: "TinyAI - Rule-Based AI Learning Project"
description: "A lightweight, rule-based AI written in C# for learning purposes"
url: "https://realmg51-cpu.github.io"
baseurl: "/p.tinyai"

# Author
author: realmg51-cpu
github_username: realmg51-cpu
discord_invite: "https://discord.gg/4D8fxxRDR"

# Build settings
markdown: kramdown
theme: minima
plugins:
  - jekyll-feed
  - jekyll-seo-tag
  - jekyll-sitemap
  - jekyll-include-cache

# Exclude
exclude:
  - Gemfile
  - Gemfile.lock
  - node_modules
  - vendor
  - .gitignore

# Defaults
defaults:
  - scope:
      path: ""
      type: "pages"
    values:
      layout: "default"
      lang: "en"

# Version
latest_version: "v1.2.0"
